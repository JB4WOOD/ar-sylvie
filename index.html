<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JB4WOOD - Étagères sur mesure | Sylvie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --vert: #1a4a2e;
            --vert-light: #24633e;
            --or-bois: #b8954a;
            --or-clair: #d4b06a;
            --or-pale: #e8d5a0;
            --beton: #e8e4e0;
            --beton-light: #f0edea;
            --blanc: #ffffff;
            --text: #2a2520;
            --text-soft: #6b6058;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--text);
            background: var(--beton);
            background-image: url('assets/fond-beton.png');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
        }

        /* Main layout - fills viewport */
        .page {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 24px 20px env(safe-area-inset-bottom, 16px);
        }

        /* Top: logo + title */
        .hero {
            text-align: center;
            padding: 12px 0 16px;
            flex-shrink: 0;
        }

        .logo {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            overflow: hidden;
            margin: 0 auto 14px;
            box-shadow: 0 6px 24px rgba(26,74,46,0.2), 0 2px 6px rgba(0,0,0,0.1);
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-style: italic;
            font-size: 1.6rem;
            color: var(--or-bois);
            letter-spacing: 0.04em;
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-style: italic;
            font-size: 0.85rem;
            color: var(--vert);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Middle: card - flexible */
        .card {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(184,149,74,0.15);
            border-radius: 20px;
            padding: 24px 22px;
            box-shadow: 0 8px 40px rgba(26,74,46,0.08), 0 2px 12px rgba(0,0,0,0.04);
            min-height: 0;
        }

        .greeting {
            font-size: 0.95rem;
            line-height: 1.65;
            color: var(--text-soft);
            text-align: center;
            margin-bottom: 20px;
        }

        .greeting strong {
            color: var(--vert);
            font-weight: 600;
        }

        /* Project cards */
        .project-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .project-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 18px;
            background: linear-gradient(135deg, var(--vert) 0%, var(--vert-light) 100%);
            color: var(--blanc);
            text-decoration: none;
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .project-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(184,149,74,0.15) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .project-card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(26,74,46,0.3); }
        .project-card:hover::after { opacity: 1; }
        .project-card:active { transform: scale(0.98); }

        .project-icon {
            width: 44px;
            height: 44px;
            border-radius: 11px;
            background: rgba(255,255,255,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .project-info {
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .project-name {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-style: italic;
            font-size: 1rem;
            margin-bottom: 2px;
        }

        .project-desc {
            font-size: 0.78rem;
            opacity: 0.7;
            font-weight: 300;
        }

        .project-arrow {
            font-size: 1.1rem;
            opacity: 0.5;
            transition: all 0.3s;
            position: relative;
            z-index: 1;
        }

        .project-card:hover .project-arrow { opacity: 1; transform: translateX(3px); }

        /* Bottom badge */
        .footer-badge {
            flex-shrink: 0;
            text-align: center;
            padding: 14px 0 4px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(26,74,46,0.07);
            border: 1px solid rgba(26,74,46,0.12);
            border-radius: 24px;
            font-size: 0.75rem;
            color: var(--vert);
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .badge-dot {
            width: 7px;
            height: 7px;
            background: var(--vert);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.4); }
        }

        .badge-icons {
            display: flex;
            gap: 4px;
            font-size: 1rem;
        }

        /* Watermark */
        .watermark {
            position: fixed;
            bottom: -3%;
            right: -3%;
            width: 40vw;
            max-width: 260px;
            opacity: 0.03;
            pointer-events: none;
            filter: grayscale(100%);
            z-index: 0;
        }

        /* Responsive height */
        @media (max-height: 600px) {
            .hero { padding: 6px 0 10px; }
            .logo { width: 56px; height: 56px; }
            h1 { font-size: 1.3rem; }
            .subtitle { font-size: 0.75rem; }
            .card { padding: 16px 18px; }
            .greeting { font-size: 0.85rem; margin-bottom: 14px; }
            .project-card { padding: 12px 14px; }
            .project-icon { width: 36px; height: 36px; font-size: 1.1rem; }
        }

        @media (max-height: 500px) {
            .greeting { display: none; }
            .hero { padding: 4px 0 6px; }
        }

        @media (min-height: 800px) {
            .logo { width: 96px; height: 96px; }
            h1 { font-size: 1.9rem; }
            .card { padding: 32px 28px; }
        }
    </style>
</head>
<body>
    <img src="assets/logo-noir.png" alt="" class="watermark">

    <div class="page">
        <div class="hero">
            <div class="logo"><img src="assets/logo-bois.png" alt="JB4WOOD"></div>
            <h1>JB4WOOD</h1>
            <p class="subtitle">Votre artisan menuisier</p>
        </div>

        <div class="card">
            <p class="greeting">
                Bonjour <strong>Sylvie</strong> !<br>
                Visualisez vos futures étagères en 3D et testez-les
                directement chez vous en réalité augmentée.
            </p>

            <div class="project-links">
                <a href="etagere-canape.html" class="project-card">
                    <div class="project-icon">&#x1f6cb;</div>
                    <div class="project-info">
                        <div class="project-name">Étagère Canapé</div>
                        <div class="project-desc">Mur côté canapé</div>
                    </div>
                    <div class="project-arrow">&rarr;</div>
                </a>
                <a href="etagere-tv.html" class="project-card">
                    <div class="project-icon">&#x1f4fa;</div>
                    <div class="project-info">
                        <div class="project-name">Étagère TV</div>
                        <div class="project-desc">Mur côté télévision</div>
                    </div>
                    <div class="project-arrow">&rarr;</div>
                </a>
            </div>
        </div>

        <div class="footer-badge">
            <div class="badge">
                <span class="badge-dot"></span>
                Disponible sur tablette et smartphone
                <span class="badge-icons">&#x1f4f1;</span>
            </div>
        </div>
    </div>
</body>
</html>
