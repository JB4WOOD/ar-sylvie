<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JB4WOOD - Étagères Sylvie</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f0eb;
            color: #3a2e26;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 32px 24px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 {
            font-size: 1.4rem;
            letter-spacing: 0.08em;
            margin-bottom: 4px;
        }
        .subtitle {
            font-size: 0.9rem;
            opacity: 0.6;
            margin-bottom: 28px;
        }
        .description {
            font-size: 0.85rem;
            line-height: 1.6;
            color: #5a4a3a;
            margin-bottom: 28px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .links a {
            display: block;
            padding: 16px;
            background: #3a2e26;
            color: #f5f0eb;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background 0.2s;
        }
        .links a:hover { background: #4a3e36; }
        .links a span {
            display: block;
            font-size: 0.8rem;
            font-weight: 400;
            opacity: 0.7;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>JB4WOOD</h1>
        <p class="subtitle">Projet Étagères - Sylvie</p>
        <p class="description">
            Bonjour Sylvie ! Vous pouvez visualiser chaque étagère en 3D
            et la tester directement dans votre pièce grâce à la réalité augmentée.
        </p>
        <div class="links">
            <a href="etagere-canape.html">
                Étagère Canapé
                <span>Mur côté canapé</span>
            </a>
            <a href="etagere-tv.html">
                Étagère TV
                <span>Mur côté TV</span>
            </a>
        </div>
    </div>
</body>
</html>
