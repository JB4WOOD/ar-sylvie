<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JB4WOOD - Étagères sur mesure | Sylvie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --wood-dark: #2c1e14;
            --wood-mid: #5a3e2b;
            --wood-light: #8b6914;
            --cream: #faf6f1;
            --cream-dark: #f0e8dd;
            --gold: #c8a45e;
            --gold-light: #e8d5a0;
            --text: #3a2e26;
            --text-soft: #6b5d52;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--cream);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(200,164,94,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(90,62,43,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(200,164,94,0.05) 0%, transparent 50%);
            animation: bgShift 12s ease-in-out infinite alternate;
        }

        .bg-watermark {
            position: fixed;
            bottom: -5%;
            right: -5%;
            width: 55vw;
            max-width: 380px;
            opacity: 0.04;
            z-index: 0;
            pointer-events: none;
            filter: grayscale(100%);
        }

        @keyframes bgShift {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0;
            animation: float 8s ease-in-out infinite;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 10s; }
        .particle:nth-child(2) { left: 25%; animation-delay: 2s; animation-duration: 8s; }
        .particle:nth-child(3) { left: 45%; animation-delay: 4s; animation-duration: 12s; }
        .particle:nth-child(4) { left: 65%; animation-delay: 1s; animation-duration: 9s; }
        .particle:nth-child(5) { left: 85%; animation-delay: 3s; animation-duration: 11s; }
        .particle:nth-child(6) { left: 35%; animation-delay: 5s; animation-duration: 7s; }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.3; }
            50% { opacity: 0.15; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }

        /* Layout */
        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
        }

        /* Header / Logo */
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease-out;
        }

        .logo-mark {
            width: 96px;
            height: 96px;
            margin: 0 auto 16px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(44,30,20,0.3), 0 2px 8px rgba(44,30,20,0.15);
            position: relative;
        }

        .logo-mark img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: var(--wood-dark);
        }

        .tagline {
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--text-soft);
            margin-top: 6px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* Main card */
        .card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(200,164,94,0.15);
            border-radius: 24px;
            padding: 36px 28px;
            max-width: 420px;
            width: 100%;
            box-shadow:
                0 4px 24px rgba(44,30,20,0.06),
                0 20px 60px rgba(44,30,20,0.08);
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        .greeting {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text-soft);
            margin-bottom: 28px;
            text-align: center;
        }

        .greeting strong {
            color: var(--text);
            font-weight: 600;
        }

        /* Project cards */
        .project-links {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .project-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            background: linear-gradient(135deg, var(--wood-dark) 0%, var(--wood-mid) 100%);
            color: var(--cream);
            text-decoration: none;
            border-radius: 16px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .project-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(200,164,94,0.15) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .project-card:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 40px rgba(44,30,20,0.25);
        }

        .project-card:hover::before { opacity: 1; }

        .project-card:active {
            transform: translateY(0) scale(0.98);
        }

        .project-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .project-info {
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .project-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .project-desc {
            font-size: 0.8rem;
            opacity: 0.7;
            font-weight: 300;
        }

        .project-arrow {
            font-size: 1.2rem;
            opacity: 0.5;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .project-card:hover .project-arrow {
            opacity: 1;
            transform: translateX(4px);
        }

        /* AR badge */
        .ar-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 20px;
            padding: 8px 16px;
            background: linear-gradient(135deg, rgba(200,164,94,0.12), rgba(200,164,94,0.05));
            border: 1px solid rgba(200,164,94,0.2);
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--wood-mid);
            font-weight: 500;
            letter-spacing: 0.03em;
        }

        .ar-badge .dot {
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        /* Footer */
        .footer {
            margin-top: 32px;
            text-align: center;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .footer p {
            font-size: 0.7rem;
            color: var(--text-soft);
            opacity: 0.5;
            letter-spacing: 0.05em;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 380px) {
            .card { padding: 28px 20px; }
            h1 { font-size: 1.7rem; }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <img src="assets/logo-noir.png" alt="" class="bg-watermark">
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container">
        <div class="logo-section">
            <div class="logo-mark"><img src="assets/logo-bois.png" alt="JB4WOOD"></div>
            <h1>JB4WOOD</h1>
            <p class="tagline">Menuiserie &middot; Ébénisterie</p>
        </div>

        <div class="card">
            <p class="greeting">
                Bonjour <strong>Sylvie</strong> !<br>
                Visualisez vos étagères en 3D et testez-les directement
                chez vous en réalité augmentée.
            </p>

            <div class="project-links">
                <a href="etagere-canape.html" class="project-card">
                    <div class="project-icon">&#x1f6cb;</div>
                    <div class="project-info">
                        <div class="project-name">Étagère Canapé</div>
                        <div class="project-desc">Mur côté canapé</div>
                    </div>
                    <div class="project-arrow">&rarr;</div>
                </a>
                <a href="etagere-tv.html" class="project-card">
                    <div class="project-icon">&#x1f4fa;</div>
                    <div class="project-info">
                        <div class="project-name">Étagère TV</div>
                        <div class="project-desc">Mur côté télévision</div>
                    </div>
                    <div class="project-arrow">&rarr;</div>
                </a>
            </div>

            <div style="text-align: center;">
                <div class="ar-badge">
                    <span class="dot"></span>
                    Réalité augmentée disponible sur tablette
                </div>
            </div>
        </div>

        <div class="footer">
            <p>JB4WOOD &middot; Menuiserie sur mesure &middot; Auvergne</p>
        </div>
    </div>
</body>
</html>
